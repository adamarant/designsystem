name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest   # npm >= 11.5.1 required by OIDC
      - run: npm ci
      - run: npm run build               # no prepublishOnly here, build explicitly
      - run: npm publish                 # no NODE_AUTH_TOKEN: OIDC mints it
