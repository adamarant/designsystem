name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # NB: no registry-url — it writes an .npmrc with _authToken=${NODE_AUTH_TOKEN}
      # which short-circuits OIDC and causes a 404/403 on publish. OIDC needs NO token.
      - run: npm install -g npm@latest   # npm >= 11.5.1 required by OIDC
      - run: npm ci
      - run: npm run build               # no prepublishOnly here, build explicitly
      - name: diag (OIDC preconditions)
        run: |
          echo "node=$(node -v)  npm=$(npm -v)"
          echo "npm path: $(which npm)"
          echo "OIDC request url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+YES}"
          echo "registry: $(npm config get registry)"
      - run: npm publish --loglevel verbose   # no NODE_AUTH_TOKEN: OIDC mints it
